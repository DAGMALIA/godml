name: random-forest-custom-model
version: 1.0.0
provider: mlflow
description: "Modelo de clasificación para predecir baja de clientes en Telco"

dataset:
  uri: ./data/data.csv
  hash: auto

model:
  type: my_custom
  source: core # local
  hyperparameters:
    max_depth: 5
    n_estimators: 100
    random_state: 42

metrics:
- name: auc
  threshold: 0.6
- name: accuracy
  threshold: 0.6

governance:
  owner: "arturo@godml.ai"
  tags:
  - source: "demo"
  - model: "custom-rf"
  - compliance: gdpr
    project: churn

deploy:
  realtime: false
  batch_output: ./outputs/predictions_custom_model.csv

deploy_config:
  dev:
    docker_tag: godml:dev
    port: 8000
    host: 0.0.0.0
