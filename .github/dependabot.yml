version: 2

updates:
  # ── Python dependencies ──────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Mexico_City
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps(python)"
    groups:
      # Batch minor/patch updates to reduce PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # ── GitHub Actions ───────────────────────────────────────────────────────
  # Dependabot will auto-pin action references to SHA hashes
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Mexico_City
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(actions)"
