name: 🚀 GODML Stable Release & Supply Chain (v1.0.0)

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  packages: write

jobs:
  supplychain:
    name: 🔐 GODML Supply Chain + PyPI Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Python setup
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3️⃣ Install dependencies
      - name: 📦 Install project dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          pip install toml-cli pip-tools bandit safety
          pip install --upgrade pip==25.3
          pip-compile pyproject.toml --extra all -o requirements.lock --generate-hashes || true
          pip install -r requirements.lock

      # 4️⃣ Static code security scan (Bandit)
      - name: 🧪 Bandit Scan (Static Analysis)
        run: |
          echo "🔍 Running Bandit for static code security..."
          bandit -r godml -f txt -o bandit_report.txt || true
          echo "✅ Bandit completed. Review bandit_report.txt for details."
          cat bandit_report.txt

      # 5️⃣ Dependency security scan (Safety)
      - name: 📦 Safety Dependency Scan
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          args: >
            --file requirements.lock
            --full-report
            --ignore 71691,71693,71578,71577,71587,71692,71579,71584,71701,71703,71706,71707,62727,62800,62801

          output-format: screen
      # 🧾 Security Justification
      # MLflow 3.4.0 mantiene vulnerabilidades reportadas sin fix disponible.
      # Mitigaciones:
      # - Ejecución en entorno aislado (CI/CD y contenedores)
      # - Sin ejecución arbitraria ni entrada de usuario directa
      # - Dependencias verificadas por hash en requirements.lock
      # - Monitoreo continuo en Safety Platform
      # Política aplicada: “Risk accepted with documented mitigation” (Supply Chain).

      # 6️⃣ Generate SBOM
      - name: 🧱 Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      # 7️⃣ Install Cosign
      - name: 🔑 Install Cosign
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: "v2.3.0"

      # 8️⃣ Sign SBOM (OIDC)
      - name: 🪶 Sign SBOM (OIDC Keyless)
        run: |
          echo "🔐 Signing SBOM..."
          cosign sign-blob --yes \
            --output-signature sbom.spdx.sig \
            --bundle sbom.spdx.bundle \
            --output-certificate sbom.spdx.crt \
            sbom.spdx.json
          echo "✅ SBOM signed successfully."

      # 9️⃣ Generate provenance (SLSA)
      - name: 🧾 Generate provenance (SLSA)
        run: |
          echo "🧾 Generating provenance..."
          cat > provenance.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildType": "https://dagmalia.com/build/python",
              "builder": { "id": "urn:github:actions" },
              "buildConfig": {
                "repo": "${GITHUB_REPOSITORY}",
                "workflow": "${GITHUB_WORKFLOW}",
                "commit": "${GITHUB_SHA}"
              },
              "materials": [
                { "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}", "digest": { "sha1": "${GITHUB_SHA}" } }
              ]
            }
          }
          EOF
          cosign sign-blob --yes \
            --output-signature provenance.sig \
            --bundle provenance.bundle \
            --output-certificate provenance.crt \
            provenance.json
          echo "✅ Provenance signed successfully."

      # 🔟 Upload supply chain artifacts
      - name: 📤 Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supplychain-artifacts
          path: |
            bandit_report.txt
            sbom.spdx.json
            sbom.spdx.sig
            sbom.spdx.crt
            sbom.spdx.bundle
            provenance.json
            provenance.sig
            provenance.crt
            provenance.bundle

      # 1️⃣1️⃣ Verify signatures
      - name: 🧠 Verify SBOM & Provenance integrity
        run: |
          echo "🧩 Verifying signatures..."
          cosign verify-blob \
            --bundle sbom.spdx.bundle \
            --certificate-identity-regexp "github.com/DAGMALIA" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            sbom.spdx.json
          cosign verify-blob \
            --bundle provenance.bundle \
            --certificate-identity-regexp "github.com/DAGMALIA" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            provenance.json
          echo "✅ Signatures verified and auditable."

      # 1️⃣2️⃣ Build & publish to PyPI
      - name: 🏗️ Build distribution
        run: python -m build

      - name: 🚀 Publish to PyPI (OIDC Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          skip-existing: true

      # 1️⃣3️⃣ Tag release
      - name: 🔖 Tag and push v1.0.0
        run: |
          git config user.name "Arturo Gutierrez Rubio Rojas"
          git config user.email "agtzrubio@dagmalia.com"
          git tag -a "v1.0.0" -m "🚀 GODML Stable Governance Release"
          git push origin "v1.0.0"

      # 1️⃣4️⃣ Release summary
      - name: 🧾 GODML Stable Summary
        run: |
          echo "🧾 GODML v1.0.0 Stable Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Static analysis and safety scans complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM & provenance generated and signed (OIDC keyless)" >> $GITHUB_STEP_SUMMARY
          echo "📦 GODML v1.0.0 published to PyPI via Trusted Publisher" >> $GITHUB_STEP_SUMMARY
          echo "🔖 Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY

      # 1️⃣5️⃣ Residual risk notice (visible in Actions UI)
      - name: 🧩 Residual Risk Notice
        run: |
          echo "::notice::Residual risk: MLflow 3.4.0 vulnerabilities documented and accepted under supply chain policy"