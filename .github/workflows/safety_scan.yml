name: 🧩 GODML Core Supply Chain Scan (pyproject-based)

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  supplychain:
    name: 🔐 GODML Supply Chain Audit (pyproject)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3️⃣ Install base dependencies
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          pip install toml-cli pip-tools bandit safety

          pip-compile pyproject.toml --extra all -o requirements.lock --generate-hashes || true
          pip install -r requirements.lock

      # 4️⃣ Static code scan (Bandit)
      - name: Run Bandit
        run: |
          echo "🔎 Running Bandit scan..."
          bandit -r godml -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      # 5️⃣ Dependency vulnerabilities (Safety)
      - name: Run Safety scan
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          args: --file requirements.lock --full-report --ignore 71691,71693,71578,71577,71587,71692,71579,71584

      # 6️⃣ Generate SBOM
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          metadata: '{"predicateType":"spdxjson"}'

      # 7️⃣ Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: "v2.3.0"

      # 8️⃣ Sign SBOM file (keyless)
      - name: Sign SBOM (OIDC)
        run: |
          echo "🔐 Signing SBOM with Cosign..."
          cosign sign-blob --yes \
            --output-signature sbom.spdx.sig \
            sbom.spdx.json
          echo "✅ SBOM signed successfully."

      # 9️⃣ Generate & sign provenance (SLSA)
      - name: Generate provenance (SLSA)
        run: |
          echo "🧾 Generating provenance..."
          cat > provenance.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildType": "https://dagmalia.com/build/python",
              "builder": { "id": "urn:github:actions" },
              "buildConfig": {
                "repo": "${GITHUB_REPOSITORY}",
                "workflow": "${GITHUB_WORKFLOW}",
                "commit": "${GITHUB_SHA}"
              },
              "materials": [
                { "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}", "digest": { "sha1": "${GITHUB_SHA}" } }
              ]
            }
          }
          EOF

          cosign sign-blob --yes \
            --output-signature provenance.sig \
            provenance.json
          echo "✅ Provenance signed successfully."

      # 🔟 Upload artifacts (reports + signatures)
      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supplychain-artifacts
          path: |
            bandit-report.txt
            sbom.spdx.json
            sbom.spdx.sig
            provenance.json
            provenance.sig

      # 1️⃣1️⃣ Summary
      - name: Supply Chain Summary
        run: |
          echo "🧾 GODML Supply Chain Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Bandit static analysis complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Safety dependency scan complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM generated & signed (OIDC keyless)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Provenance (SLSA v1) generated & signed" >> $GITHUB_STEP_SUMMARY
          echo "🔖 Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY