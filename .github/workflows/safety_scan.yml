name: 🚀 GODML Stable Release & Supply Chain (v1.0.0)

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write
  packages: write

jobs:
  supplychain:
    name: 🔐 GODML Supply Chain + PyPI Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3️⃣ Install dependencies
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build
          pip install toml-cli pip-tools bandit safety
          pip-compile pyproject.toml --extra all -o requirements.lock --generate-hashes || true
          pip install -r requirements.lock

      # 4️⃣ Static code scan
      - name: Run Bandit
        run: |
          echo "🔎 Running Bandit scan..."
          bandit -r godml -f txt -o bandit-report.txt || true
          cat bandit-report.txt

      # 5️⃣ Dependency vulnerabilities
      - name: Run Safety scan
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
          args: --file requirements.lock --full-report --ignore 71691,71693,71578,71577,71587,71692,71579,71584

      # 6️⃣ Generate SBOM
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      # 7️⃣ Install Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: "v2.3.0"

      # 8️⃣ Sign SBOM (keyless)
      - name: Sign SBOM (OIDC)
        run: |
          echo "🔐 Signing SBOM..."
          cosign sign-blob --yes \
            --output-signature sbom.spdx.sig \
            --bundle sbom.spdx.bundle \
            --output-certificate sbom.spdx.crt \
            sbom.spdx.json
          echo "✅ SBOM signed successfully."

      # 9️⃣ Generate & sign provenance (SLSA)
      - name: Generate provenance (SLSA)
        run: |
          echo "🧾 Generating provenance..."
          cat > provenance.json <<EOF
          {
            "_type": "https://in-toto.io/Statement/v1",
            "predicateType": "https://slsa.dev/provenance/v1",
            "predicate": {
              "buildType": "https://dagmalia.com/build/python",
              "builder": { "id": "urn:github:actions" },
              "buildConfig": {
                "repo": "${GITHUB_REPOSITORY}",
                "workflow": "${GITHUB_WORKFLOW}",
                "commit": "${GITHUB_SHA}"
              },
              "materials": [
                { "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}", "digest": { "sha1": "${GITHUB_SHA}" } }
              ]
            }
          }
          EOF
          cosign sign-blob --yes \
            --output-signature provenance.sig \
            --bundle provenance.bundle \
            --output-certificate provenance.crt \
            provenance.json
          echo "✅ Provenance signed successfully."

      # 🔟 Upload artifacts
      - name: Upload supply chain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supplychain-artifacts
          path: |
            bandit-report.txt
            sbom.spdx.json
            sbom.spdx.sig
            sbom.spdx.crt
            sbom.spdx.bundle
            provenance.json
            provenance.sig
            provenance.crt
            provenance.bundle

      # 1️⃣1️⃣ Verify integrity
      - name: Verify SBOM & Provenance integrity
        run: |
          echo "🧠 Verifying signatures..."
          cosign verify-blob \
            --bundle sbom.spdx.bundle \
            --certificate-identity-regexp "github.com/DAGMALIA" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            sbom.spdx.json
          cosign verify-blob \
            --bundle provenance.bundle \
            --certificate-identity-regexp "github.com/DAGMALIA" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            provenance.json
          echo "✅ Signatures verified and auditable."

      # 1️⃣2️⃣ Build and publish to PyPI (OIDC Trusted Publisher)
      - name: Build distribution
        run: python -m build

      - name: Publish to PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          skip-existing: true

      # 1️⃣3️⃣ Tag release
      - name: Tag and push v1.0.0
        run: |
          git config user.name " Arturo Gutierrez Rubio Rojas"
          git config user.email "agtzrubio@dagmalia.com"
          git tag -a "v1.0.0" -m "🚀 GODML Stable Governance Release"
          git push origin "v1.0.0"

      # 1️⃣4️⃣ Summary
      - name: GODML Stable Summary
        run: |
          echo "🧾 GODML v1.0.0 Stable Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Static analysis and safety scans complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM & provenance generated and signed (OIDC keyless)" >> $GITHUB_STEP_SUMMARY
          echo "📦 GODML v1.0.0 published to PyPI via Trusted Publisher" >> $GITHUB_STEP_SUMMARY
          echo "🔖 Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
