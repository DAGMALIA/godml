name: OpenSSF Scorecard

on:
  # Run on every push to main to track score over time
  push:
    branches: [main]
  # Run weekly even if no push — catches dep/vuln changes
  schedule:
    - cron: "30 6 * * 1"  # Mondays 06:30 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to Security tab
      id-token: write          # publish results to api.securityscorecards.dev
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish to public API so the badge works
          publish_results: true

      - name: Upload Scorecard SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@f09c1c0a94de965c15400f5634aa42fac9096fd3 # v3.28.5
        with:
          sarif_file: scorecard-results.sarif
          category: scorecard

      - name: Upload Scorecard results as artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698b8c8ac243d6f82e7e8c5 # v4.6.0
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 30
