name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ─── 1. Build sdist + wheel ──────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Generate artifact hashes (SLSA input)
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698b8c8ac243d6f82e7e8c5 # v4.6.0
        with:
          name: dist
          path: dist/

  # ─── 2. SBOM (CycloneDX JSON) ────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install + generate SBOM
        run: |
          pip install -e . cyclonedx-bom
          cyclonedx-py environment --output-format JSON --outfile sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698b8c8ac243d6f82e7e8c5 # v4.6.0
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # ─── 3. SLSA Level 3 Provenance ──────────────────────────────────────────
  # Uses the official slsa-github-generator reusable workflow.
  # This provides SLSA L3: isolated builder + unforgeable provenance via OIDC.
  provenance:
    name: SLSA L3 provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  # ─── 4. GitHub Release ───────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, sbom, provenance]
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444306234aff7dc4f03a3a5b # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Download SBOM
        uses: actions/download-artifact@fa0a91b85d4f404e444306234aff7dc4f03a3a5b # v4.1.8
        with:
          name: sbom
          path: .

      - name: Create release with assets
        uses: softprops/action-gh-release@c95fe1489e9db8e2304ce4e5b4bd0eda9ed77f1a # v2.2.1
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom.cyclonedx.json

  # ─── 5. PyPI Trusted Publishing (OIDC) ───────────────────────────────────
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, provenance]
    environment:
      name: pypi
      url: https://pypi.org/p/godml
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444306234aff7dc4f03a3a5b # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f062b82a32edd9f65e6e5f5b37a # v1.12.4
        with:
          skip-existing: true
