name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=godml \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ── Dependency audit (open source, no API key) ───────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + pip-audit
        run: |
          pip install --upgrade pip
          pip install -e "." pip-audit

      - name: Run pip-audit
        run: |
          touch pip-audit-report.md
          pip-audit \
            --desc \
            --format markdown \
            --output pip-audit-report.md \
            --ignore-vuln PYSEC-2024-230 \
            || true
          if [ -s pip-audit-report.md ]; then
            cat pip-audit-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No known vulnerabilities found by pip-audit." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload pip-audit report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.md
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff==0.15.17"

      - name: Run ruff
        run: ruff check godml/ --select=E,W,F --ignore=E501

  install-smoke-test:
    name: Smoke test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core only (no extras)
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Smoke test — core import
        run: python -c "import godml; print('GODML core import OK')"

      - name: Smoke test — no gpt4all needed
        run: |
          python -c "
          from godml.config_service.loader import load_config
          from godml.compliance_service.pci_dss import PciDssCompliance
          from godml.monitoring_service.metrics import compute_metrics
          print('Core services import OK without optional deps')
          "
  # ── SAST — Bandit static analysis (all commits/PRs → feeds Scorecard SAST check) ─
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[sarif]==1.9.4"

      - name: Run Bandit (HIGH/CRITICAL only)
        run: |
          bandit -r godml -f sarif -o bandit_report.sarif -lll || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        if: always()
        with:
          sarif_file: bandit_report.sarif
          category: bandit