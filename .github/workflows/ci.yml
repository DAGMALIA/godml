name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=godml \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0565863a31f2c7f16d31e6df4aec6bc444d5b62 # v5.4.0
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ── Dependency audit (open source, no API key) ───────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + pip-audit
        run: |
          pip install --upgrade pip
          pip install -e "." pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --desc \
            --format markdown \
            --output pip-audit-report.md \
            --ignore-vuln PYSEC-2024-230 \
            || true
          cat pip-audit-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload pip-audit report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698b8c8ac243d6f82e7e8c5 # v4.6.0
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.md
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check godml/ --select=E,W,F --ignore=E501,W503

  install-smoke-test:
    name: Smoke test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core only (no extras)
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Smoke test — core import
        run: python -c "import godml; print('GODML core import OK')"

      - name: Smoke test — no gpt4all needed
        run: |
          python -c "
          from godml.config_service.loader import load_config
          from godml.compliance_service.pci_dss import PciDssCompliance
          from godml.monitoring_service.metrics import compute_metrics
          print('Core services import OK without optional deps')
          "
